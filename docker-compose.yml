version: '3.8'

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    env_file:
      - ./apps/api/.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
    depends_on:
      - postgres
      - redis
      - mailhog
    restart: always
    volumes:
      - ./apps/api/wwwroot/storage:/app/wwwroot/storage
    networks:
      - campanha-360-network

  postgres:
    image: postgis/postgis:15-3.3-alpine
    environment:
      POSTGRES_DB: campanhas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - campanha-360-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - campanha-360-network

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # HTTP UI port
    networks:
      - campanha-360-network

networks:
  campanha-360-network:
    driver: bridge

volumes:
  postgres_data:
